# Validates Cortex builds on push. Homelab Docker redeploy is handled on the server
# (npm run server:deploy or the 2-minute deploy-watch timer — see docs/homelab-deploy.md).
name: Homelab CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend build
        working-directory: backend
        run: |
          npm ci --include=dev
          npx prisma generate
          npm run build

      - name: Frontend build (homelab same-origin /api)
        working-directory: frontend
        run: |
          npm ci --include=dev
          npm run build
