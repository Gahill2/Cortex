# Validates cloud deploy artifacts on push; optional scheduled redeploy trigger for Railway/Vercel.
name: Cloud deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Redeploy trigger when GitHub is connected to Railway/Vercel (empty commit, no file changes).
    - cron: "0 8,20 * * *"

permissions:
  contents: write

jobs:
  validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend build
        working-directory: backend
        run: |
          npm ci --include=dev
          npx prisma generate
          npm run build

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://example.up.railway.app/api
        run: |
          npm ci --include=dev
          npm run build

  scheduled-redeploy-trigger:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Empty commit to trigger Railway/Vercel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled cloud redeploy trigger"
          git push origin main
