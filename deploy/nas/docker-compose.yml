# NAS services — separate from Cortex (deploy/homelab).
# Storage split under NAS_DATA_ROOT — see docs/nas-homelab-layout.md
#
#   cp .env.example .env && ../../scripts/nas-init-dirs.sh
#   docker compose --env-file .env up -d
#   docker compose --profile backup --env-file .env up -d   # nightly restic

name: cortex-nas

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - ${NAS_DATA_ROOT}/appdata/jellyfin/config:/config
      - ${NAS_DATA_ROOT}/media:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=

  nextcloud-db:
    image: mariadb:11
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?Set NEXTCLOUD_DB_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ${NAS_DATA_ROOT}/appdata/nextcloud/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nextcloud:
    image: nextcloud:apache
    restart: unless-stopped
    ports:
      - "${NEXTCLOUD_PORT:-8081}:80"
    depends_on:
      nextcloud-db:
        condition: service_healthy
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?Set NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: localhost ${TAILSCALE_HOST:-}
    volumes:
      - ${NAS_DATA_ROOT}/cloud:/var/www/html

  # Immich: official stack in ./immich/ (docker compose -f immich/docker-compose.yml)

  # Nightly backup: cortex dumps + cloud + photos + appdata (not full media by default)
  backup:
    profiles: ["backup"]
    image: mazzolino/restic:latest
    restart: unless-stopped
    hostname: cortex-nas-backup
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:?Set RESTIC_PASSWORD}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      RESTIC_BACKUP_SOURCES: >-
        /backup/cortex
        /backup/cloud
        /backup/photos
        /backup/appdata
      RESTIC_BACKUP_ARGS: >-
        --verbose
      RESTIC_FORGET_ARGS: >-
        --keep-daily 7 --keep-weekly 4 --keep-monthly 6
      RUN_ON_STARTUP: "false"
    volumes:
      - ${NAS_DATA_ROOT}/cortex:/backup/cortex:ro
      - ${NAS_DATA_ROOT}/cloud:/backup/cloud:ro
      - ${NAS_DATA_ROOT}/photos:/backup/photos:ro
      - ${NAS_DATA_ROOT}/appdata:/backup/appdata:ro
      - ${RESTIC_REPOSITORY}:/restic
