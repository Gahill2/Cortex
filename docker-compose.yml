# Root compose — optional services only. App Postgres runs via InsForge hub (see docs/insforge-tailscale.md).
#
#   npm run hub:up          # Postgres + InsForge (+ optional Cortex API/web) on :5432, :7130, …
#   docker compose up -d n8n   # automation only

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: cortex-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Set to your Tailscale IP or public URL so Webhook nodes get reachable URLs, e.g.:
      # WEBHOOK_URL=http://100.x.x.x:5678/
      - GENERIC_TIMEZONE=America/Chicago
      - TZ=America/Chicago
    volumes:
      - cortex_n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  cortex_n8n_data:
